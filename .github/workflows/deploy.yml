name: Deploy to Cloudflare

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    # Only deploy when CI passed or when triggered manually.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: |
          ./node_modules/.bin/prisma generate
          bash scripts/patch-prisma-for-workers.sh

      - name: Build
        run: npm run build

      # Overwrite the D1 database ID in wrangler.toml from secrets so the
      # committed value can be a placeholder or a different environment's ID.
      # Skips gracefully when the secret is not set.
      - name: Set D1 database ID
        run: |
          if [ -n "$CF_D1_DATABASE_ID" ]; then
            sed -i 's|^database_id = "[^"]*"|database_id = "'"$CF_D1_DATABASE_ID"'"|' wrangler.toml
          fi
        env:
          CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}

      - name: Run D1 migrations
        run: ./node_modules/.bin/wrangler d1 migrations apply action-gate
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # ── Deploy API worker ────────────────────────────────────────────────────
      - name: Deploy API worker
        run: ./node_modules/.bin/wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # ── Deploy dashboard (Cloudflare Pages) ──────────────────────────────────
      - name: Deploy dashboard
        run: ./node_modules/.bin/wrangler pages deploy docs --project-name action-gate-dashboard
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
